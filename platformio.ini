; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[common]
monitor_speed = 115200
build_flags = -DMQTT_MAX_PACKET_SIZE=512
lib_deps = 
	knolleary/PubSubClient@^2.8
	esphome/AsyncTCP-esphome@^1.2.2
	ottowinter/ESPAsyncWebServer-esphome@^2.1.0
	milesburton/DallasTemperature@^3.10.0
	bblanchon/ArduinoJson@^7.0.0

[env:production]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
board_build.partitions = min_spiffs.csv
monitor_speed = ${common.monitor_speed}
build_flags = 
	${common.build_flags}
	-DMQTT_CLIENT_ID=\"PoolMonitor\"
	-DMQTT_TOPIC=\"pool/monitor\"
	-DHEATPUMP_POLL_MS=90000
lib_deps = ${common.lib_deps}
; Temporarily using serial upload to flash OTA protection code
; After first serial upload, uncomment espota lines below for OTA updates
upload_protocol = espota
upload_port = 192.168.0.163
upload_flags = 
	--timeout=300

[env:test]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
board_build.partitions = min_spiffs.csv
monitor_speed = ${common.monitor_speed}
build_flags = 
	${common.build_flags}
	-DDEBUG
	-DMQTT_CLIENT_ID=\"PoolMonitor_Test\"
	-DMQTT_TOPIC=\"pool/monitor/test\"
	-DHEATPUMP_POLL_MS=30000
lib_deps = ${common.lib_deps}
upload_protocol = espota
upload_port = 192.168.0.167
upload_flags = 
	--timeout=30

; ----------------------------------------------------------------------
; Host-PC unit tests. Run with `pio test -e native`. Compiles only the
; managers under test (PumpController, ScheduleManager) against the minimal
; Arduino/Preferences/MQTTManager mocks in test/test_native/mocks/.
; HeatPumpManager is excluded because it uses HTTPS/ArduinoJson which
; require the full ESP32 Arduino framework.
; No board needed.
; Requires a host C++ compiler on PATH; on this machine LLVM clang at
; C:\Program Files\LLVM\bin is wrapped by scripts/shims/{gcc,g++,ar,
; ranlib}.cmd, which scripts/native_use_clang.py prepends to PATH.
[env:native]
platform = native
test_framework = unity
test_build_src = yes
build_src_filter = -<*> +<PumpController.cpp> +<ScheduleManager.cpp>
build_flags =
	-std=gnu++17
	-I test/test_native/mocks
	-I src
	-DNATIVE_TEST
extra_scripts = pre:scripts/native_use_clang.py
