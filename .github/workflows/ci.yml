name: CI

on:
  push:
    branches:
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: platformio-${{ hashFiles('platformio.ini') }}
          restore-keys: platformio-

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Create stub credentials header
        run: |
          cat > src/cred.h << 'EOF'
          #pragma once
          #define SS_ID        "ci_ssid"
          #define auth         "ci_password"
          #define HTTP_USER    "ci_user"
          #define HTTP_PASS    "ci_pass"
          #define MQTT_USER    "ci_mqtt_user"
          #define MQTT_PASS    "ci_mqtt_pass"
          #define LINKED_GO_USER "ci_linked_go_user"
          #define LINKED_GO_PASS "ci_linked_go_pass"
          EOF

      - name: Build production environment
        run: pio run -e production

      - name: Build test environment
        run: pio run -e test
